apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: cloudnative-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: infra-demo-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081

          envFrom:
            - configMapRef:
                name: api-configmap
            - secretRef:
                name: api-secret

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5